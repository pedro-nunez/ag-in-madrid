<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script>
    // Applies a stored light/dark choice (if any) before the page paints,
    // so returning visitors never see a flash of the wrong theme. Shares
    // localStorage with the main pedro-nunez.github.io site, since this
    // page lives at a path under the same origin, so a theme choice made
    // on either site carries over to the other automatically.
    (function () {
      var stored = localStorage.getItem("theme");
      if (stored === "light" || stored === "dark") {
        document.documentElement.setAttribute("data-theme", stored);
      }
    })();
  </script>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/info-toggle.js' | relative_url }}" defer></script>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">{{ site.title }}</span>
  </div>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
  <div class="page-wrap">
    <main class="page-content">
      {{ content }}
    </main>
  </div>
</body>
</html>
